<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>家庭积分</title>
</head>
<body style="font-family:sans-serif;padding:20px;text-align:center;background:#f5f5f5">
<h2 style="color:#1976D2">🏠 家庭积分管理 V3.0</h2>
<input id="u" placeholder="账号" value="admin" style="width:200px;padding:10px;margin:10px"><br>
<input id="p" type="password" placeholder="密码" value="123456" style="width:200px;padding:10px;margin:10px"><br>
<button onclick="login()" style="width:220px;padding:12px;background:#1976D2;color:#fff;border:none;cursor:pointer">登录</button>
<div id="msg" style="margin:20px;color:#666"></div>
<script>
var API = window.location.origin;
function login() {
    var u = document.getElementById('u').value;
    var p = document.getElementById('p').value;
    fetch(API+'/api/admin/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:u,password:p})
    }).then(function(r){return r.json()}).then(function(r){
        if(r.success) {
            document.getElementById('msg').innerHTML = '<span style="color:green">登录成功！</span>';
        } else {
            document.getElementById('msg').innerHTML = '<span style="color:red">'+r.message+'</span>';
        }
    }).catch(function(e){
        document.getElementById('msg').innerHTML = '<span style="color:red">错误: '+e+'</span>';
    });
}
</script>
</body>
</html>
